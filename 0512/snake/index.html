<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="經典貪吃蛇遊戲 PWA">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>貪吃蛇</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
    <div class="container">
        <header>
            <h1>🐍 貪吃蛇</h1>
            <div class="score-board">
                <div class="score">得分: <span id="score">0</span></div>
                <div class="high-score">最高分: <span id="high-score">0</span></div>
            </div>
        </header>

        <div class="game-info">
            <div class="difficulty">
                <label>難度：</label>
                <select id="difficulty">
                    <option value="200">簡單</option>
                    <option value="120" selected>中等</option>
                    <option value="80">困難</option>
                </select>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div id="mobileControls" class="dpad">
            <div class="dpad-row">
                <button class="dpad-btn" data-dir="up">▲</button>
            </div>
            <div class="dpad-row">
                <button class="dpad-btn" data-dir="left">◀</button>
                <button class="dpad-btn" data-dir="down">▼</button>
                <button class="dpad-btn" data-dir="right">▶</button>
            </div>
        </div>

        <div class="instructions">
            <h3>📖 操作說明</h3>
            <ul>
                <li>⌨️ 方向鍵 / WASD 控制蛇的方向</li>
                <li>📱 虛擬方向鍵或滑動手勢控制</li>
                <li>␣ 空格鍵 暫停/繼續遊戲</li>
            </ul>
        </div>

        <div class="controls">
            <button id="startBtn">開始遊戲</button>
            <button id="restartBtn" class="hidden">重新開始</button>
        </div>

        <div id="gameOverModal" class="modal hidden">
            <div class="modal-content">
                <h2>遊戲結束！</h2>
                <p>你的得分：<span id="finalScore">0</span></p>
                <button id="playAgainBtn">再玩一次</button>
            </div>
        </div>

        <div id="pauseModal" class="modal hidden">
            <div class="modal-content">
                <h2>暫停中</h2>
                <p>按下空格鍵或點擊繼續按鈕繼續遊戲</p>
                <button id="resumeBtn">繼續</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker 註冊成功'))
                    .catch(err => console.log('Service Worker 註冊失敗:', err));
            });
        }
    </script>
</body>
</html>
